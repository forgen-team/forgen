name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows 는 hooks-portability 잡에서 빌드/postinstall/hook-loading 으로 별도 검증.
        # 풀 vitest 는 다수 통합 테스트가 /tmp, POSIX path, bash spawn 가정에 묶여 있어
        # cross-platform 재작성이 별도 트랙. 본 잡에서는 ubuntu/macos + arm64 만 커버.
        os: [ubuntu-latest, macos-latest]
        # v0.4.9: Node 22+ 로 좁힘 — node:sqlite (observability + FTS5 인덱스) 필수.
        # Node 20 은 hooks-portability 잡 (hook 모듈만 import) 에서 회귀 가드 유지.
        node-version: [22]
        include:
          # arm64 커버리지 — GitHub-hosted ubuntu-24.04-arm runner (public repo 무료)
          - os: ubuntu-24.04-arm
            node-version: 22
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # tests/git-stats.test.ts 가 실 git log 30 일 윈도우를 분석
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Regenerate hooks/hooks.json (release-mode, deterministic)
        run: node scripts/prepack-hooks.cjs
      - name: Test
        shell: bash
        run: npx vitest run ${{ (matrix.node-version == 22 && matrix.os == 'ubuntu-latest') && '--coverage' || '' }}
      - run: npm pack --dry-run

  # Portability matrix — 사용자 보고된 "npm i -g 후 각종 훅 에러" 를 CI 에서 잡기.
  #   - Node 20.0/20.9: import attributes 미지원 (회귀 가드)
  #   - Node 20.10: import attributes 지원 시작
  #   - Node 22: 안정 베이스라인
  #   - Windows: symlink/path 분리 / 권한 회귀 가드
  hooks-portability:
    name: Hooks load on Node ${{ matrix.node-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: ['20.0.0', '20.10.0', '20.x', '22.x']
        include:
          - os: macos-latest
            node-version: '22.x'
          - os: windows-latest
            node-version: '20.x'
          - os: windows-latest
            node-version: '22.x'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run build
      - name: Smoke load every hook (parses + executes without error)
        shell: bash
        run: |
          fail=0
          for hook in dist/hooks/*.js; do
            case "$(basename "$hook")" in
              # internal helpers, not standalone entrypoints
              hook-config.js|hook-registry.js|hooks-generator.js|post-tool-handlers.js) continue ;;
            esac
            out=$(echo '{"tool_name":"Read","tool_input":{},"prompt":"hi","session_id":"ci","cwd":"."}' \
              | node "$hook" 2>&1) || true
            if echo "$out" | grep -qE 'SyntaxError|Cannot find module|ERR_'; then
              echo "FAIL: $hook"
              echo "$out" | head -10
              fail=$((fail+1))
            fi
          done
          if [ "$fail" -gt 0 ]; then
            echo "::error::$fail hook(s) failed to load on Node $(node --version)"
            exit 1
          fi
          echo "All hooks loaded successfully on Node $(node --version) / ${{ matrix.os }}"
