name: forgen-eval

on:
  pull_request:
    paths:
      - 'packages/forgen-eval/**'
      - 'docs/adr/ADR-004-*'
      - 'docs/adr/ADR-005-*'
      - 'docs/adr/ADR-006-*'
      - '.github/workflows/forgen-eval.yml'
  push:
    branches: [main]
    paths:
      - 'packages/forgen-eval/**'

jobs:
  unit:
    name: Type-check + unit tests (free tier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check forgen-eval
        run: npx tsc --noEmit -p tsconfig.json
        working-directory: packages/forgen-eval
      - name: Run forgen-eval unit tests
        run: npx vitest run --no-coverage
        working-directory: packages/forgen-eval

  dataset-version-check:
    name: Verify dataset pin resolves
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Read pinned commit
        id: pin
        run: |
          # 실제 벤더링된 핀 파일을 읽는다. 과거엔 존재하지 않는 경로
          # (packages/forgen-eval/datasets-version.json)를 읽고 flaky 원격 curl로
          # fallback해 빈 커밋으로 깨졌다 — 로컬 vendored 파일을 단일 소스로 사용.
          PIN_FILE=packages/forgen-eval/datasets/opus48-hard/datasets-version.json
          if [ ! -f "$PIN_FILE" ]; then
            echo "::error::pin file missing: $PIN_FILE"
            exit 1
          fi
          COMMIT=$(jq -r '.commit' "$PIN_FILE")
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
      - name: Verify commit exists in forgen-eval-data
        run: |
          # 데이터셋은 datasets/opus48-hard/ 로 in-repo vendored 라 이 레포만으로
          # 재현 가능하다. 외부 소스 핀은 provenance 용 belt-and-suspenders이며,
          # PLACEHOLDER_BOOTSTRAP 는 "외부 핀 미확립" 을 정직하게 표기한 상태로
          # warning 처리(비차단). 실제 커밋 해시가 박히면 원격 존재를 강제 검증한다.
          if [ "${{ steps.pin.outputs.commit }}" = "PLACEHOLDER_BOOTSTRAP" ]; then
            echo "::warning::external dataset pin unresolved (bootstrap placeholder) — dataset is vendored in-repo; push forgen-eval-data + re-pin in R2 before publishing effect claims"
            exit 0
          fi
          gh api repos/forgen-team/forgen-eval-data/commits/${{ steps.pin.outputs.commit }} > /dev/null
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sanity-eval:
    name: Baseline regression check (no API keys)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run baseline regression check
        run: node packages/forgen-eval/scripts/check-baseline.cjs
      - name: Run phi gate
        run: node packages/forgen-eval/scripts/phi-gate.cjs

  # Smoke testbed (requires Ollama + Qwen 72B + Llama 70B → self-hosted GPU runner only)
  # Uncomment + configure when self-hosted runner is available.
